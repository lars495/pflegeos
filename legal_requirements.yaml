# Legal Requirements — Quelle der Wahrheit für rechtliche Pflichten
#
# Wird vom monatlichen Legal-Audit-Agenten aktualisiert.
# Manuelle Einträge sind erlaubt — Agent merged anhand der ID.
#
# Status-Werte:
#   compliant — Anforderung erfüllt + Test belegt es
#   risk      — teilweise erfüllt, Lücken bekannt
#   gap       — nicht erfüllt
#   planned   — bewusst noch nicht umgesetzt, in Roadmap
#
# Severity:
#   critical — Bußgeld-/Patientensicherheits-Risiko, blockiert Deploy
#   high     — Audit-relevant, sollte zeitnah behoben werden
#   medium   — Best Practice
#   low      — Nice-to-have

version: 1
last_audit: null

requirements:

  # === SGB XI — Pflegeversicherung ===

  - id: SGB_XI_113b
    title: "Personalbemessung nach PpUGV"
    source_url: "https://www.gesetze-im-internet.de/sgb_11/__113b.html"
    summary: >
      Pflegeeinrichtungen müssen nach dem Personalbemessungsverfahren
      (PpUGV) die erforderliche Personalausstattung ermitteln und
      vorhalten. Dokumentation der Ist-Besetzung verpflichtend.
    affects: ["Dienstplanung", "Reports"]
    implemented_in: []
    test_files: []
    status: planned
    severity: high
    last_verified: null
    notes: "Phase 5"

  - id: SGB_XI_113c
    title: "Personaluntergrenze"
    source_url: "https://www.gesetze-im-internet.de/sgb_11/__113c.html"
    summary: >
      Mindestpersonalschlüssel je Versorgungsbereich. Unterschreitung
      ist meldepflichtig.
    affects: ["Dienstplanung"]
    implemented_in: []
    test_files: []
    status: planned
    severity: high
    last_verified: null

  # === BGB — Betreuungsrecht ===

  - id: BGB_1901a
    title: "Patientenverfügung und mutmaßlicher Wille"
    source_url: "https://www.gesetze-im-internet.de/bgb/__1901a.html"
    summary: >
      Bei nicht-einwilligungsfähigen Personen ist der zuvor erklärte
      oder mutmaßliche Wille maßgeblich, nicht das, was Angehörige
      oder Behandelnde für richtig halten.
    affects: ["Pflegeplan-Canvas", "Angehörigen-Portal"]
    implemented_in: []
    test_files: []
    status: planned
    severity: critical
    last_verified: null
    notes: >
      Direkt verbunden mit Phase-2-Feature "Tochter-Ich vs. Mutter-Wille".
      Im UI muss explizit zwischen "eigenem Wunsch" und "mutmaßlichem
      Willen" unterschieden werden.

  - id: BGB_1827
    title: "Patientenverfügung — Formerfordernis"
    source_url: "https://www.gesetze-im-internet.de/bgb/__1827.html"
    summary: >
      Patientenverfügung muss schriftlich erfolgen. Software-gespeicherte
      Verfügungen brauchen Verweis auf Original.
    affects: ["Bewohner-Profil"]
    implemented_in: []
    test_files: []
    status: planned
    severity: high
    last_verified: null

  # === DSGVO ===

  - id: DSGVO_ART9
    title: "Verarbeitung besonderer Kategorien personenbezogener Daten"
    source_url: "https://dsgvo-gesetz.de/art-9-dsgvo/"
    summary: >
      Gesundheitsdaten dürfen nur mit ausdrücklicher Einwilligung oder
      einer der in Art. 9 Abs. 2 genannten Rechtsgrundlagen verarbeitet
      werden. Technische und organisatorische Maßnahmen (TOM) verpflichtend.
    affects: ["alle Module"]
    implemented_in: []
    test_files: []
    status: planned
    severity: critical
    last_verified: null

  - id: DSGVO_ART15
    title: "Auskunftsrecht der betroffenen Person"
    source_url: "https://dsgvo-gesetz.de/art-15-dsgvo/"
    summary: >
      Bewohner (und Angehörige bezüglich eigener Daten) müssen
      maschinenlesbar Auskunft erhalten können über alle gespeicherten
      personenbezogenen Daten.
    affects: ["Bewohner-Profil", "Angehörigen-Portal"]
    implemented_in: []
    test_files: []
    status: planned
    severity: high
    last_verified: null

  - id: DSGVO_ART17
    title: "Recht auf Löschung"
    source_url: "https://dsgvo-gesetz.de/art-17-dsgvo/"
    summary: >
      Betroffene haben Anspruch auf Löschung — soweit nicht
      Aufbewahrungspflichten (Pflegedoku) entgegenstehen.
    affects: ["alle Module mit personenbezogenen Daten"]
    implemented_in: []
    test_files: []
    status: planned
    severity: high
    last_verified: null

  - id: DSGVO_ART32
    title: "Sicherheit der Verarbeitung"
    source_url: "https://dsgvo-gesetz.de/art-32-dsgvo/"
    summary: >
      Pseudonymisierung, Verschlüsselung, Vertraulichkeit, Integrität,
      Verfügbarkeit, Belastbarkeit — Stand der Technik.
    affects: ["Infrastruktur"]
    implemented_in: []
    test_files: []
    status: planned
    severity: critical
    last_verified: null

