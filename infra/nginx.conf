worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Security headers (applied per-server below)
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://api.pflegeos.de; frame-ancestors 'none'; base-uri 'self';";
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=contribute:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ─── Public Site ───────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name pflegeos.de www.pflegeos.de;

        ssl_certificate     /etc/nginx/certs/pflegeos.de/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/pflegeos.de/privkey.pem;
        ssl_protocols       TLSv1.3;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $csp_header always;

        location / {
            proxy_pass http://public-site:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ─── Care App (Patientendaten — strenger) ──────────────────
    server {
        listen 443 ssl http2;
        server_name care.pflegeos.de;

        ssl_certificate     /etc/nginx/certs/care.pflegeos.de/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/care.pflegeos.de/privkey.pem;
        ssl_protocols       TLSv1.3;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy $csp_header always;

        location / {
            proxy_pass http://care-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ─── API ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.pflegeos.de;

        ssl_certificate     /etc/nginx/certs/api.pflegeos.de/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/api.pflegeos.de/privkey.pem;
        ssl_protocols       TLSv1.3;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Strenges Rate-Limiting für Contribute
        location /v1/contribute {
            limit_req zone=contribute burst=2 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ─── HTTP → HTTPS Redirect ─────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
