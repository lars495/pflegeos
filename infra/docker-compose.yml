# PflegeOS Docker Compose
#
# Profiles:
#   default  — db, redis, api, worker, public-site (boot ohne weiteres)
#   ui       — care-app (sobald Frontend existiert)
#   edge     — nginx + TLS (sobald Domain mit Certs existiert)
#
# Lokal/VPS-Boot ohne Profile:
#   docker compose -f infra/docker-compose.yml --env-file infra/.env up -d
#
# Mit allen Profilen (Produktion):
#   docker compose -f infra/docker-compose.yml --env-file infra/.env --profile ui --profile edge up -d

services:

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pflegeos
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d pflegeos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/pflegeos
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DAILY_BUDGET_USD: "1.10"
      LEGAL_AUDIT_MONTHLY_BUDGET_USD: "${LEGAL_AUDIT_MONTHLY_BUDGET_USD:-6}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      ENV: ${ENV:-production}
    # Temporäre Port-Exposition bis nginx + TLS aktiv ist (edge-profile).
    # Wird durch docker-compose.override.yml entfernt sobald produktiv.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # Placeholder bis worker-Modul existiert — schläft, damit Container nicht crasht
    command: ["python", "-c", "import time;print('worker idle (no jobs module yet)', flush=True);time.sleep(86400)"]
    # Healthcheck überschreiben (sonst erbt der Worker den HTTP-Check vom API-Image)
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/pflegeos
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DAILY_BUDGET_USD: "1.10"
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  public-site:
    build:
      context: ../apps/public-site
    restart: unless-stopped
    # Lokaler Port nur fürs Debugging — produktiv läuft Public Site auf Vercel
    ports:
      - "127.0.0.1:3000:3000"
    networks: [internal]

  # === Profile: ui (sobald Care-App existiert) ===
  care-app:
    profiles: ["ui"]
    build:
      context: ../apps/care-app
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: "https://${API_DOMAIN:-localhost}"
    depends_on:
      - api
    networks: [internal]

  # === Profile: edge (sobald TLS-Certs vorliegen) ===
  nginx:
    profiles: ["edge"]
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - public-site
      - api
    networks: [internal]

volumes:
  db_data:
  redis_data:

networks:
  internal:
    driver: bridge
