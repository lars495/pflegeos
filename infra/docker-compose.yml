services:

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pflegeos
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d pflegeos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/pflegeos
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DAILY_BUDGET_USD: "1.10"
      ENV: ${ENV:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]

  worker:
    build:
      context: ../apps/api
    restart: unless-stopped
    command: ["python", "-m", "worker"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/pflegeos
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DAILY_BUDGET_USD: "1.10"
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  care-app:
    build:
      context: ../apps/care-app
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: https://api.pflegeos.de
    depends_on:
      - api
    networks: [internal]

  public-site:
    build:
      context: ../apps/public-site
    restart: unless-stopped
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - care-app
      - public-site
      - api
    networks: [internal]

volumes:
  db_data:
  redis_data:

networks:
  internal:
    driver: bridge
